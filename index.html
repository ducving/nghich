<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Cute Mobile App Concept</title>
    <style>
      :root {
        --bg-color: #fff0f5;
        --text-color: #ff69b4;
        --accent-pink: #ffb6c1;
        --card-bg: rgba(255, 255, 255, 0.85);
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      body,
      html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: var(--bg-color);
        font-family: "Quicksand", sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      #canvas-background {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 0;
      }

      /* Mobile Frame Emulator for Desktop / Main Container for Mobile */
      .mobile-container {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 414px; /* iPhone Pro Max width */
        height: 100vh;
        max-height: 896px; /* iPhone Pro Max height */
        margin: auto;
        padding: 30px 20px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;

        /* Glass card effect */
        background: var(--card-bg);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border: 2px solid rgba(255, 255, 255, 0.5);
        box-shadow: 0 20px 50px rgba(255, 105, 180, 0.15);
      }

      @media (min-width: 500px) {
        .mobile-container {
          height: 80vh;
          border-radius: 40px;
          border: 8px solid #fff;
        }
      }

      .logo-icon {
        width: 100px;
        height: 100px;
        margin-bottom: 20px;
        animation: float 3s ease-in-out infinite;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0) rotate(-5deg);
        }
        50% {
          transform: translateY(-20px) rotate(5deg);
        }
      }

      .logo-text {
        font-size: 2.2rem;
        font-weight: 700;
        color: #ff1493;
        margin-bottom: 8px;
      }

      h2 {
        font-size: 1.4rem;
        font-weight: 600;
        margin: 20px 0 10px;
        line-height: 1.3;
      }

      p {
        font-size: 1rem;
        color: #db7093;
        margin-bottom: 30px;
        padding: 0 20px;
      }

      .btn-primary {
        background: linear-gradient(135deg, #ff69b4, #ff1493);
        color: white;
        border: none;
        padding: 16px 40px;
        border-radius: 50px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 10px 20px rgba(255, 20, 147, 0.3);
        transition: transform 0.2s;
        text-decoration: none;
      }

      .btn-primary:active {
        transform: scale(0.95);
      }

      .heart-icon {
        display: block;
        font-size: 2.5rem;
        margin-bottom: 10px;
        animation: heartBeat 1.5s infinite;
      }

      @keyframes heartBeat {
        0% {
          transform: scale(1);
        }
        15% {
          transform: scale(1.3);
        }
        30% {
          transform: scale(1);
        }
        45% {
          transform: scale(1.2);
        }
        60% {
          transform: scale(1);
        }
      }
    </style>
  </head>
  <body>
    <canvas id="canvas-background"></canvas>

    <!-- Container cho nút không add và meme3 -->
    <div id="meme3-container" class="floating-container">
      <div class="meme-bubble">
        <img
          src="meme3.jpg"
          alt="User Meme 3"
          style="
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
          "
        />
      </div>
      <button class="no-add-btn" style="position: static; margin-top: 10px">
        không add!
      </button>
    </div>

    <!-- Các meme ẩn xuất hiện lần lượt -->
    <div id="meme2-container" class="floating-container" style="display: none">
      <div class="meme-bubble">
        <img
          src="meme2.jpg"
          alt="Meme 2"
          style="
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
          "
        />
      </div>
      <div class="meme-text">Nút đếy thêm cho có thôi hẹ hẹ</div>
      <button class="no-add-btn" style="position: static; margin-top: 10px">
        Đừng bấm vào đây nữa nha!
      </button>
    </div>

    <div id="meme4-container" class="floating-container" style="display: none">
      <div class="meme-bubble">
        <img
          src="meme4.jpg"
          alt="Meme 4"
          style="
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
          "
        />
      </div>
      <div class="meme-text">Lêu lêu bảo đừng bấm mò!</div>
      <button class="no-add-btn" style="position: static; margin-top: 10px">
        git
      </button>
    </div>

    <div id="meme5-container" class="floating-container" style="display: none">
      <div class="meme-bubble">
        <img
          src="meme5.jpg"
          alt="Meme 5"
          style="
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
          "
        />
      </div>
      <div class="meme-text">He he cứng đầu ghê!</div>
      <button class="no-add-btn" style="position: static; margin-top: 10px">
        Còn bấm nữa à?
      </button>
    </div>

    <!-- Container cho Facebook Link -->
    <div id="fb-container" class="floating-container">
      <a
        href="https://www.facebook.com/ucvinh.207737"
        target="_blank"
        class="meme-bubble"
      >
        <img
          src="meme1.jpg"
          alt="User Meme Icon"
          style="
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
          "
        />
      </a>
      <div class="meme-text">add fb đi cậu</div>
    </div>

    <style>
      .fb-bubble {
        position: fixed;
        width: 100px;
        height: 100px;
        left: 50%;
        top: 50%;
        background-color: transparent;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        text-decoration: none;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        z-index: 9999;
        transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        /* Animation CSS cũ đã được gỡ bỏ để nhường chỗ cho JS di chuyển tự do */
      }

      .fb-bubble:hover {
        transform: scale(1.1);
      }

      .fb-bubble svg {
        width: 32px;
        height: 32px;
      }

      @keyframes moveAround {
        0% {
          transform: translate(0, 0);
        }
        25% {
          transform: translate(-30px, -50px);
        }
        50% {
          transform: translate(-80px, 20px);
        }
        75% {
          transform: translate(-40px, -100px);
        }
        100% {
          transform: translate(-10px, -20px);
        }
      }

      .no-add-btn {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 10000;
        background: rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        color: #ff1493;
        padding: 8px 16px;
        border-radius: 20px;
        font-family: "Quicksand", sans-serif;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        text-transform: lowercase;
      }

      .no-add-btn:hover {
        background: rgba(255, 20, 147, 0.1);
        border-color: #ff1493;
        transform: translateY(-2px);
      }

      .floating-container {
        position: fixed;
        width: 150px;
        z-index: 9998;
        display: flex;
        flex-direction: column;
        align-items: center;
        pointer-events: none; /* Cho phép click xuyên qua vùng trống của container */
      }

      /* Kích hoạt lại pointer-events cho các phần tử thực sự cần click */
      .meme-bubble,
      .no-add-btn {
        pointer-events: auto;
      }

      .meme-bubble {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        overflow: hidden;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        border: 3px solid #fff;
        cursor: pointer;
        transition: transform 0.2s;
      }

      .meme-bubble:active {
        transform: scale(0.9);
      }

      .meme-text {
        margin-top: 10px;
        background: white;
        color: #ff4500;
        padding: 5px 12px;
        border-radius: 15px;
        font-size: 0.9rem;
        font-weight: 700;
        white-space: nowrap;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        border: 1px solid #ff8c00;
      }
    </style>

    <script>
      // Logic cho các meme ẩn xuất hiện lần lượt
      let clickCount = 0;
      let m3Active = true;

      const memeContainers = [
        {
          id: "meme2-container",
          pos: { x: 50, y: 50 },
          vel: { x: 3, y: 2 },
          active: false,
        },
        {
          id: "meme4-container",
          pos: { x: 100, y: 150 },
          vel: { x: -3, y: 3 },
          active: false,
        },
        {
          id: "meme5-container",
          pos: { x: 200, y: 100 },
          vel: { x: 2, y: -4 },
          active: false,
        },
      ];

      const triggerMemes = () => {
        // Ẩn ảnh hiện tại trước khi hiện ảnh mới
        if (clickCount === 0) {
          m3Active = false;
          document.getElementById("meme3-container").style.display = "none";
        } else if (clickCount > 0 && clickCount <= memeContainers.length) {
          const prevMeme = memeContainers[clickCount - 1];
          prevMeme.active = false;
          const prevEl = document.getElementById(prevMeme.id);
          if (prevEl) prevEl.style.display = "none";
        }

        if (clickCount < memeContainers.length) {
          const meme = memeContainers[clickCount];
          const el = document.getElementById(meme.id);
          el.style.display = "flex";
          meme.active = true;

          const animateMeme = () => {
            if (!meme.active) return;
            meme.pos.x += meme.vel.x;
            meme.pos.y += meme.vel.y;

            if (meme.pos.x <= 0 || meme.pos.x >= window.innerWidth - 150)
              meme.vel.x *= -1;
            if (meme.pos.y <= 0 || meme.pos.y >= window.innerHeight - 150)
              meme.vel.y *= -1;

            el.style.left = meme.pos.x + "px";
            el.style.top = meme.pos.y + "px";
            requestAnimationFrame(animateMeme);
          };

          animateMeme();
          clickCount++;
        } else if (clickCount === 3) {
          // Lần nhấn thứ 4
          // 1. Đổi ảnh FB sang meme6
          const fbImg = document.querySelector("#fb-container img");
          fbImg.src = "meme6.jpg";

          // 2. Đổi text link FB
          const fbText = document.querySelector("#fb-container .meme-text");
          fbText.innerText = "He he, add đi nà cứ ngại thoi!";

          // 3. Đảm bảo tất cả meme khác đều ẩn
          memeContainers.forEach((m) => {
            m.active = false;
            document.getElementById(m.id).style.display = "none";
          });
          document.getElementById("meme3-container").style.display = "none";

          clickCount++;
        }
      };

      // Gán sự kiện click cho tất cả các nút và bong bóng meme (trừ bubble Facebook)
      function initTriggers() {
        // Chọn tất cả các bubble và button trong các container trừ fb-container
        const triggers = document.querySelectorAll(
          ".floating-container:not(#fb-container) .meme-bubble, .floating-container:not(#fb-container) .no-add-btn",
        );
        triggers.forEach((t) => {
          t.addEventListener("click", (e) => {
            e.preventDefault();
            e.stopPropagation();
            triggerMemes();
          });
        });
      }

      initTriggers();

      const bubble = document.getElementById("fb-container");
      let posX = Math.random() * (window.innerWidth - 100);
      let posY = Math.random() * (window.innerHeight - 100);
      let velX = (Math.random() - 0.5) * 4;
      let velY = (Math.random() - 0.5) * 4;

      function moveBubble() {
        posX += velX;
        posY += velY;

        // Kiểm tra va chạm cạnh trái/phải
        if (posX <= 0 || posX >= window.innerWidth - 100) {
          velX *= -1;
          // Đảm bảo không bị kẹt
          posX = posX <= 0 ? 1 : window.innerWidth - 101;
        }

        // Kiểm tra va chạm cạnh trên/dưới
        if (posY <= 0 || posY >= window.innerHeight - 100) {
          velY *= -1;
          // Đảm bảo không bị kẹt
          posY = posY <= 0 ? 1 : window.innerHeight - 101;
        }

        bubble.style.left = posX + "px";
        bubble.style.top = posY + "px";

        requestAnimationFrame(moveBubble);
      }

      // Logic cho meme3 (nút không add di chuyển)
      const meme3Container = document.getElementById("meme3-container");
      let m3PosX = Math.random() * (window.innerWidth - 150);
      let m3PosY = Math.random() * (window.innerHeight - 150);
      let m3VelX = (Math.random() - 0.5) * 5;
      let m3VelY = (Math.random() - 0.5) * 5;

      function moveMeme3() {
        if (!m3Active) return;
        m3PosX += m3VelX;
        m3PosY += m3VelY;

        if (m3PosX <= 0 || m3PosX >= window.innerWidth - 150) m3VelX *= -1;
        if (m3PosY <= 0 || m3PosY >= window.innerHeight - 150) m3VelY *= -1;

        meme3Container.style.left = m3PosX + "px";
        meme3Container.style.top = m3PosY + "px";

        requestAnimationFrame(moveMeme3);
      }

      // Khởi chạy khi trang load xong
      window.addEventListener("load", () => {
        // Đặt vị trí ban đầu
        bubble.style.left = posX + "px";
        bubble.style.top = posY + "px";

        meme3Container.style.left = m3PosX + "px";
        meme3Container.style.top = m3PosY + "px";

        moveBubble();
        moveMeme3();
      });

      // Cập nhật lại giới hạn khi thay đổi kích thước màn hình
      window.addEventListener("resize", () => {
        if (posX > window.innerWidth - 100) posX = window.innerWidth - 100;
        if (posY > window.innerHeight - 100) posY = window.innerHeight - 100;
      });
    </script>

    <script>
      const canvas = document.getElementById("canvas-background");
      const ctx = canvas.getContext("2d");

      let width, height, particles;
      const particleCount = 25; // Less particles for mobile performance
      const cuteIcons = [
        "🌸",
        "✨",
        "🐱",
        "🎀",
        "☁️",
        "🍭",
        "🧸",
        "🦄",
        "🍓",
        "🌈",
      ];

      class Particle {
        constructor() {
          this.init();
        }

        init() {
          this.x = Math.random() * width;
          this.y = Math.random() * height;
          this.vx = (Math.random() - 0.5) * 0.8;
          this.vy = (Math.random() - 0.5) * 0.8;
          this.size = Math.random() * 15 + 15;
          this.icon = cuteIcons[Math.floor(Math.random() * cuteIcons.length)];
          this.alpha = Math.random() * 0.4 + 0.2;
          this.rotation = Math.random() * Math.PI * 2;
          this.rotationSpeed = (Math.random() - 0.5) * 0.01;
        }

        update() {
          this.rotation += this.rotationSpeed;
          this.x += this.vx;
          this.y += this.vy;

          if (
            this.x < -50 ||
            this.x > width + 50 ||
            this.y < -50 ||
            this.y > height + 50
          ) {
            this.init();
          }
        }

        draw() {
          ctx.save();
          ctx.globalAlpha = this.alpha;
          ctx.translate(this.x, this.y);
          ctx.rotate(this.rotation);
          ctx.font = `${this.size}px Arial`;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(this.icon, 0, 0);
          ctx.restore();
        }
      }

      function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        initParticles();
      }

      function initParticles() {
        particles = [];
        for (let i = 0; i < particleCount; i++) {
          particles.push(new Particle());
        }
      }

      function animate() {
        ctx.clearRect(0, 0, width, height);
        particles.forEach((p) => {
          p.update();
          p.draw();
        });
        requestAnimationFrame(animate);
      }

      window.addEventListener("resize", resize);
      resize();
      animate();
    </script>
  </body>
</html>
